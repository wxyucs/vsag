<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <title>fp32 vs fp16 vs bf16: IEEE 754 field widths</title>
  <desc>Bit-level layout comparison of the three floating-point quantizers VSAG uses for storage: fp32 has 1 sign + 8 exponent + 23 mantissa bits, fp16 has 1 + 5 + 10, bf16 has 1 + 8 + 7.</desc>
  <style>
    .sign { fill: #3e3a39; stroke: #1a1614; stroke-width: 0.8; }
    .exp  { fill: #f4bd37; stroke: #b88a16; stroke-width: 0.8; }
    .mant { fill: #fce897; stroke: #b88a16; stroke-width: 0.8; }
    .lbl { fill: #1a1614; }
    .lbl-muted { fill: #6e6a66; }
    .lbl-light { fill: #ffffff; }
  </style>

  <text class="lbl" x="20" y="24">IEEE 754 / bf16 field widths</text>

  <!-- legend -->
  <g transform="translate(440,12)">
    <rect class="sign" x="0" y="0" width="14" height="14"/><text class="lbl-muted" x="20" y="12">sign</text>
    <rect class="exp"  x="70" y="0" width="14" height="14"/><text class="lbl-muted" x="90" y="12">exponent</text>
    <rect class="mant" x="170" y="0" width="14" height="14"/><text class="lbl-muted" x="190" y="12">mantissa</text>
  </g>

  <!-- scale: 1 bit = 18 px, total width 32 bits = 576 px -->
  <!-- fp32 row -->
  <g transform="translate(40,60)">
    <text class="lbl" x="-25" y="22" font-weight="700">fp32</text>
    <rect class="sign" x="0"   y="0" width="18" height="34"/>
    <rect class="exp"  x="18"  y="0" width="144" height="34"/>
    <rect class="mant" x="162" y="0" width="414" height="34"/>
    <text class="lbl-light" x="3" y="22">s</text>
    <text class="lbl" x="78" y="22">8-bit exponent</text>
    <text class="lbl" x="320" y="22">23-bit mantissa</text>
    <text class="lbl-muted" x="0" y="52">range &#x00B1;3.4&#xD7;10&#x00B3;&#x2078;  &#xB7;  precision &#x2248; 7 decimal digits  &#xB7;  4 bytes</text>
  </g>

  <!-- fp16 row -->
  <g transform="translate(40,140)">
    <text class="lbl" x="-25" y="22" font-weight="700">fp16</text>
    <rect class="sign" x="0"   y="0" width="18" height="34"/>
    <rect class="exp"  x="18"  y="0" width="90" height="34"/>
    <rect class="mant" x="108" y="0" width="180" height="34"/>
    <text class="lbl-light" x="3" y="22">s</text>
    <text class="lbl" x="42" y="22">5-bit exp</text>
    <text class="lbl" x="142" y="22">10-bit mantissa</text>
    <text class="lbl-muted" x="0" y="52">range &#x00B1;6.5&#xD7;10&#x2074;  &#xB7;  precision &#x2248; 3 decimal digits  &#xB7;  2 bytes</text>
  </g>

  <!-- bf16 row -->
  <g transform="translate(40,220)">
    <text class="lbl" x="-25" y="22" font-weight="700">bf16</text>
    <rect class="sign" x="0"   y="0" width="18" height="34"/>
    <rect class="exp"  x="18"  y="0" width="144" height="34"/>
    <rect class="mant" x="162" y="0" width="126" height="34"/>
    <text class="lbl-light" x="3" y="22">s</text>
    <text class="lbl" x="62" y="22">8-bit exponent</text>
    <text class="lbl" x="180" y="22">7-bit mantissa</text>
    <text class="lbl-muted" x="0" y="52">range &#x00B1;3.4&#xD7;10&#x00B3;&#x2078;  &#xB7;  precision &#x2248; 2-3 decimal digits  &#xB7;  2 bytes</text>
  </g>
</svg>
